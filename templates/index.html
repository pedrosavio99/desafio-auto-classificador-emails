<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador de Emails com IA</title>
    <!-- Bootstrap 5 via CDN (rápido e bonito) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 40px 20px; background-color: #f8f9fa; }
        .container { max-width: 800px; }
        h1 { color: #0d6efd; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4 text-center">Classificador de Emails com IA (Groq)</h1>
        <p class="lead text-center mb-5">
            Faça upload de um email (.txt ou .pdf) ou cole o texto abaixo para classificar como <strong>Produtivo</strong> ou <strong>Improdutivo</strong> e receber uma sugestão de resposta automática.
        </p>

        <div class="card shadow-sm p-4">
            <h5 class="mb-3">Envie seu email</h5>
            <form method="POST" action="/processar" enctype="multipart/form-data">
                <!-- Área para colar texto -->
                <div class="mb-3">
                    <label for="texto_email" class="form-label">Ou cole o texto do email aqui:</label>
                    <textarea class="form-control" id="texto_email" name="texto_email" rows="6" placeholder="Cole o conteúdo do email aqui..."></textarea>
                </div>

                <!-- Upload de arquivo -->
                <div class="mb-3">
                    <label for="arquivo" class="form-label">Ou faça upload do arquivo (.txt ou .pdf):</label>
                    <input type="file" class="form-control" id="arquivo" name="arquivo" accept=".txt,.pdf">
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Analisar Email</button>
                </div>
            </form>
        </div>

        <footer class="mt-5 text-center text-muted">
            <small>Desenvolvido para o desafio – usando Groq + Flask</small>
        </footer>
    </div>

    <!-- Bootstrap JS (opcional por enquanto, mas útil para interações futuras) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
