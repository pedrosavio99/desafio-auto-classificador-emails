<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador de Emails com IA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 40px 20px; background-color: #f8f9fa; }
        .container { max-width: 850px; }
        h1 { color: #0d6efd; font-weight: 600; }
        .card { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">Classificador Inteligente de Emails</h1>
        <p class="lead text-center mb-5">Envie o email (.txt ou .pdf) ou cole o texto abaixo.<br>A IA classifica e sugere resposta automática.</p>

        <div class="card p-4">
            <form method="POST" action="/processar" enctype="multipart/form-data">
                <div class="mb-4">
                    <label class="form-label fw-bold">Cole o texto do email:</label>
                    <textarea class="form-control" name="texto_email" rows="8" placeholder="Cole aqui o conteúdo completo..."></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Ou faça upload do arquivo:</label>
                    <input type="file" class="form-control" name="arquivo" accept=".txt,.pdf">
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100">Analisar Email</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
